<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ABROX AI · Chat</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin:0; background:#000; font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display",system-ui,Helvetica,Arial,sans-serif; }
    .space-bg { position:relative; background:radial-gradient(circle at top,#0d4f8b 0%,#062a4d 35%,#020b16 75%); overflow:hidden; }
    #stars { position:absolute; top:0; left:0; width:100%; height:100%; z-index:0; }
    .star { position:absolute; background:#fff; border-radius:50%; }

    /* 底部导航 */
    .bottom-nav {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 80px;
      background: rgba(2, 11, 22, 0.9);
      backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255,255,255,0.08);
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding-bottom: env(safe-area-inset-bottom);
      z-index: 40;
    }
    .nav-item {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      color: #8b9bb5; font-size: 11px; font-weight: 500; cursor: pointer;
      transition: color 0.15s;
    }
    .nav-item.active { color: #3b82f6; }
    .nav-item i { font-size: 22px; }

    /* 页面容器 */
    .page-container {
      position: relative; z-index: 10;
      height: calc(100% - 100px);
      overflow-y: auto;
      padding-bottom: 90px;
      box-sizing: border-box;
    }
    .page { display: none; }
    .page.active { display: block; }

    /* 聊天列表卡片（模仿 PocketOption） */
    .chat-card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 16px;
      margin: 16px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }
    .chat-card:hover { background: rgba(255,255,255,0.1); }
    .chat-avatar {
      width: 56px; height: 56px;
      border-radius: 18px;
      background: linear-gradient(145deg, #1e4f7a, #0f365e);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06);
    }
    .chat-info h3 {
      font-size: 18px; font-weight: 700; margin: 0 0 4px; color: #fff;
    }
    .chat-meta {
      display: flex; align-items: center; gap: 8px;
      color: #a0bbd8; font-size: 13px;
    }
    .online-dot { width: 8px; height: 8px; background: #4caf50; border-radius: 50%; }

    /* 深色聊天容器 (Premium Dark) */
    .chat-room-overlay {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: #0a0f17;
      z-index: 50;
      display: flex; flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.3s ease;
    }
    .chat-room-overlay.open { transform: translateX(0); }

    .chat-header {
      padding: 16px 20px;
      border-bottom: 1px solid #1e2a3a;
      display: flex; align-items: center; gap: 12px;
      background: #0e1522;
    }
    .chat-header h2 { margin: 0; font-size: 20px; font-weight: 700; color: #fff; }
    .chat-header-sub {
      font-size: 13px; color: #8b9bb5; margin-top: 2px;
      display: flex; align-items: center; gap: 6px;
    }
    .back-btn {
      width: 40px; height: 40px; border-radius: 50%;
      background: #1a2536; border: none; color: #fff;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 20px;
    }

    /* 消息区域 */
    .chat-messages {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .message-row {
      display: flex; gap: 10px; max-width: 85%;
    }
    .message-row.incoming { align-self: flex-start; }
    .message-row.outgoing { align-self: flex-end; flex-direction: row-reverse; }
    .msg-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: #1e4f7a; display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 600; flex-shrink: 0;
    }
    .msg-bubble {
      background: #1a2536; padding: 10px 14px; border-radius: 18px;
      color: #e2e8f0; font-size: 14px; line-height: 1.4;
      border: 1px solid #2a3a4e;
    }
    .outgoing .msg-bubble { background: #2563eb; border-color: #3b82f6; color: #fff; }
    .msg-time { font-size: 10px; opacity: 0.6; margin-top: 4px; text-align: right; }

    /* 输入区域 */
    .chat-composer {
      padding: 12px 16px; border-top: 1px solid #1e2a3a;
      display: flex; gap: 10px; background: #0e1522;
    }
    .chat-composer input {
      flex: 1; background: #1a2536; border: 1px solid #2a3a4e;
      border-radius: 30px; padding: 12px 18px; color: #fff;
      outline: none; font-size: 14px;
    }
    .chat-composer input::placeholder { color: #6b7c93; }
    .send-btn {
      width: 48px; height: 48px; border-radius: 50%;
      background: #2563eb; border: none; color: #fff;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 20px;
    }

    /* 隐藏类 */
    .hidden { display: none !important; }
  </style>
</head>
<body class="flex justify-center items-center min-h-screen">
<div class="w-[390px] h-[844px] rounded-3xl overflow-hidden relative space-bg text-white">

  <!-- 星空背景 -->
  <div id="stars"></div>

  <!-- 头部 -->
  <div class="header" style="display:flex; align-items:center; justify-content:space-between; min-height:100px; padding:0 1rem; position:relative; z-index:10;">
    <div class="logo-container">
      <img src="assets/logo.png" alt="ABROX Logo" style="max-height:44px;">
    </div>
    <div class="bg-cyan-600 px-3 py-1 rounded-lg text-sm font-medium">🇺🇸 en</div>
  </div>

  <!-- 页面容器（聊天列表页） -->
  <div class="page-container" id="pageContainer">
    <!-- 聊天列表页 -->
    <div id="chatListPage" class="page active">
      <div style="padding: 16px 20px 8px;">
        <h2 style="font-size: 22px; font-weight: 700;">Chats</h2>
      </div>
      
      <!-- 聊天卡片（点击打开聊天室） -->
      <div class="chat-card" onclick="openChatRoom()">
        <div class="chat-avatar">💬</div>
        <div class="chat-info">
          <h3>Abrox General Chat</h3>
          <div class="chat-meta">
            <span class="online-dot"></span>
            <span>6,324 members</span>
            <span>•</span>
            <span id="onlineCount">247 online</span>
          </div>
          <p style="color:#8b9bb5; font-size:13px; margin-top:6px;">Tap to join the conversation</p>
        </div>
      </div>
    </div>
  </div>

  <!-- 深色聊天室 Overlay -->
  <div class="chat-room-overlay" id="chatRoomOverlay">
    <div class="chat-header">
      <button class="back-btn" onclick="closeChatRoom()">←</button>
      <div style="flex:1;">
        <h2>Abrox General Chat</h2>
        <div class="chat-header-sub">
          <span class="online-dot"></span>
          <span>6,324 members</span>
          <span>•</span>
          <span id="chatOnlineCount">247 online</span>
        </div>
      </div>
    </div>

    <!-- 消息列表 -->
    <div class="chat-messages" id="chatMessagesContainer">
      <div class="message-row incoming">
        <div class="msg-avatar">🤖</div>
        <div class="msg-bubble">
          Welcome to Abrox General Chat! AI personas are active.
          <div class="msg-time">10:30 AM</div>
        </div>
      </div>
    </div>

    <!-- 输入框 -->
    <div class="chat-composer">
      <input type="text" placeholder="Message..." id="chatInput">
      <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>
  </div>

  <!-- 底部导航 -->
  <div class="bottom-nav">
    <div class="nav-item active" data-page="chat" onclick="switchPage('chat')">
      <i>💬</i><span>Chat</span>
    </div>
    <div class="nav-item" data-page="signals" onclick="switchPage('signals')">
      <i>📡</i><span>Signals</span>
    </div>
    <div class="nav-item" data-page="training" onclick="switchPage('training')">
      <i>📚</i><span>Training</span>
    </div>
    <div class="nav-item" data-page="referrals" onclick="switchPage('referrals')">
      <i>👥</i><span>Referrals</span>
    </div>
    <div class="nav-item" data-page="progress" onclick="switchPage('progress')">
      <i>📈</i><span>Progress</span>
    </div>
  </div>
</div>

<script>
  // 星空
  const starsContainer=document.getElementById("stars");
  for(let i=0;i<40;i++){
    const s=document.createElement("div");
    s.className="star";
    s.style.top=(15+Math.random()*85)+"%";
    s.style.left=Math.random()*100+"%";
    s.style.width=s.style.height=(Math.random()*2+1)+"px";
    s.style.opacity=Math.random()*0.7+0.3;
    starsContainer.appendChild(s);
  }

  // 页面切换（占位，稍后与其他页面整合）
  function switchPage(pageId) {
    console.log('Switch to', pageId);
    // 此处只演示聊天功能，其他页面后续扩展
  }

  // 打开聊天室
  function openChatRoom() {
    document.getElementById('chatRoomOverlay').classList.add('open');
    // 模拟在线人数变化
    setInterval(() => {
      const count = 180 + Math.floor(Math.random() * 100);
      document.getElementById('chatOnlineCount').innerText = count + ' online';
      const listCount = document.getElementById('onlineCount');
      if(listCount) listCount.innerText = count + ' online';
    }, 5000);
  }

  function closeChatRoom() {
    document.getElementById('chatRoomOverlay').classList.remove('open');
  }

  // 发送消息（占位）
  function sendMessage() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text) return;
    const container = document.getElementById('chatMessagesContainer');
    const row = document.createElement('div');
    row.className = 'message-row outgoing';
    row.innerHTML = `
      <div class="msg-avatar">👤</div>
      <div class="msg-bubble">
        ${text}
        <div class="msg-time">${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
      </div>
    `;
    container.appendChild(row);
    container.scrollTop = container.scrollHeight;
    input.value = '';
  }

  // 加载后自动滚动聊天列表底部（可选）
  window.addEventListener('load', function() {
    // 可在此处加载 AI 引擎
    console.log('Ready to plug AI engine and manifest');
  });
</script>

<!-- 在此接入 AI 引擎和 manifest -->

</body>
</html>
